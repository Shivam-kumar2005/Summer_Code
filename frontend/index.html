<!doctype html>
<html lang="en">
  <head>
    <!-- 1. METADATA: Settings for the browser -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 2. WEBSITE TITLE: What you see in the browser tab -->
    <title>SUMMERCODE - AI Learning Platform</title>

    <!-- 3. EXTERNAL FONTS: Loading Inter and Outfit fonts from Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  
  <body>
    <!-- 4. REACT MOUNT POINT:
         This empty div is where React will "inject" your entire application.
         The Javascipt in main.jsx looks for this id="root". -->
    <div id="root"></div>

    <!-- 5. JAVASCRIPT ENTRY POINT:
         This starts your React application by running src/main.jsx. -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
